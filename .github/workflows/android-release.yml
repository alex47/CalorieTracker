name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.9"

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Validate release version
        id: version
        shell: bash
        run: |
          PUBSPEC_VERSION="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "pubspec.yaml does not contain a version."
            exit 1
          fi

          EXPECTED_TAG="v${PUBSPEC_VERSION}"
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec.yaml version $PUBSPEC_VERSION. Expected $EXPECTED_TAG."
            exit 1
          fi

          echo "build_name=${PUBSPEC_VERSION%%+*}" >> "$GITHUB_OUTPUT"
          echo "release_label=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify Android project exists
        run: |
          if [ ! -d "android" ]; then
            echo "Missing android/ directory. Run: flutter create --platforms android ."
            exit 1
          fi

      - name: Run offline tests with coverage
        env:
          GITHUB_TOKEN: ""
          OPENAI_API_KEY: ""
        run: flutter test --coverage

      - name: Enforce coverage policy
        run: dart run tool/check_coverage.dart

      - name: Install Linux integration-test dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang lld cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - name: Run offline integration tests
        env:
          GITHUB_TOKEN: ""
          OPENAI_API_KEY: ""
        run: flutter test integration_test/offline_app_test.dart

      - name: Prepare Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_STORE_PASSWORD" ]; then
            echo "Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, ANDROID_STORE_PASSWORD."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: |
          # Build number must be an integer for Android.
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          flutter build apk --release --build-name="${{ steps.version.outputs.build_name }}" --build-number="${VERSION_CODE}"

      - name: Rename APK with version tag
        run: |
          VERSION="${{ steps.version.outputs.release_label }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/CalorieTracker-${VERSION}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: calorie-tracker-apk
          path: build/app/outputs/flutter-apk/CalorieTracker-*.apk
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/CalorieTracker-*.apk
          generate_release_notes: true
