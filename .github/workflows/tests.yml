name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.9"

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run offline tests with coverage
        env:
          GITHUB_TOKEN: ""
          OPENAI_API_KEY: ""
        run: flutter test --coverage

      - name: Enforce coverage policy
        run: dart run tool/check_coverage.dart

      - name: Install Linux integration-test dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang lld cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev xvfb

      - name: Run offline integration tests
        env:
          GITHUB_TOKEN: ""
          OPENAI_API_KEY: ""
        run: xvfb-run --auto-servernum flutter test integration_test/offline_app_test.dart
